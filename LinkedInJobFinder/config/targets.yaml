# LinkedIn Job Finder targets
# Edit this file to control what the daily run searches for.
# Reload effect: read on every `linkedin-finder daily` run.

user:
  first_name: Kush
  # resume_filename is auto-detected if absent (first file in resumes/ that isn't README.md)
  # resume_filename: resume.pdf

search:
  # Roles to search for. Each is run independently against each location.
  roles:
    - "Software Engineer"
    - "Backend Engineer"
    - "Full Stack Engineer"
    - "Prompt Engineer"
    - "ML Engineer"
  # LinkedIn-style locations. "India" matches all India postings; specific cities work too.
  # NOTE: total queries = roles x locations x companies-filter-pass. Keep both lists tight
  # so the daily run finishes in a few minutes and stays under JobSpy's rate limits.
  locations:
    - "India"
    - "Bengaluru, Karnataka, India"
    - "Singapore"
    - "Tokyo, Japan"
    - "London, United Kingdom"
    - "Berlin, Germany"
    - "Remote"
  # JobSpy hours_old. 24 = postings within last day.
  hours_old: 24
  # Skip postings below this base salary. Null disables the filter.
  # Salaries vary widely across India / SG / EU; default off so we don't drop relevant rows.
  salary_floor_usd: null

