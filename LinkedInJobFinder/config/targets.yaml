# NOTE on careers-page URLs / ATS: the daily runner uses LinkedIn (via JobSpy)
# as its source of truth for new postings. ATS-direct (Greenhouse / Lever /
# Workday) scraping is intentionally not wired up yet. If you want me to add
# a Greenhouse / Lever ingest pass that complements LinkedIn, just ask.

filters:
  must_haves:
    - "mid-level IC role"
  dealbreakers:
    - "crypto"
    - "ad-tech"
    - "consulting"
    - "staffing"

outreach:
  # Hard caps to avoid LinkedIn flagging activity.
  daily_contact_cap: 50
  per_company_contact_cap: 8
  # Recruiter cache TTL in days. We won't re-search People for the same company until it expires.
  recruiter_cache_days: 7

posts:
  # Discover hiring-manager posts (people announcing openings via LinkedIn posts,
  # not formal job listings). Runs one Posts search per role keyword and filters
  # to posts mentioning a target company. Requires the logged-in Playwright session.
  enabled: true
  # Cap posts scraped per role search to keep the run fast.
  max_results_per_role: 30
