# LinkedIn Job Finder targets — tightened for SDE-2 / MTS / 3+ YoE
# Replace config/targets.yaml with this file once you've reviewed the tier1 picks.

user:
  first_name: Kush

search:
  # 3 roles only. High confidence matches for an SDE-2 / MTS profile. Drop
  # "Prompt Engineer" / "ML Engineer" unless your resume leads with those skills.
  roles:
    - "Software Engineer"
    - "Backend Engineer"
    - "Full Stack Engineer"
    - "Prompt Engineer"
  # 3 locations. "India" overlaps with Bengaluru so we use the specific city.
  # Singapore stays as the one realistic relocation option.
  locations:
    - "India"
    - "Remote"
    - "Singapore"
  hours_old: 24
  salary_floor_usd: null

companies:
  # Tier-1 = 15 high-confidence companies that actively hire SDE-2 / MTS in India.
  # Placeholder shortlist drawn from your existing tier1 — swap any of these out
  # before running. These are the 15 with the strongest India hiring + global eng
  # reputation at the mid-level.
  tier1:
    - "Google"
    - "Microsoft"
    - "Amazon"
    - "Apple"
    - "Uber"
    - "Airbnb"
    - "Meta"
    - "Netflix"
    - "Adobe"
    - "Stripe"
    - "Atlassian"
    - "Databricks"
    - "Snowflake"
    - "Cloudflare"
    - "Flipkart"
    - "Razorpay"
    - "Freshworks"

  # Tier-2 = ~20 companies worth applying to but not the top priority.
  # Trimmed to the modern dev-tools / AI labs / India unicorns most likely to
  # have SDE-2 equivalent openings.
  tier2:
    # AI labs
    - "Anthropic"
    - "OpenAI"
    - "Perplexity"
    - "Scale AI"
    # Modern SaaS / dev tools
    - "Notion"
    - "Linear"
    - "Figma"
    - "Vercel"
    - "GitHub"
    - "Datadog"
    - "MongoDB"
    - "Confluent"
    # India / Asia consumer + fintech
    - "PhonePe"
    - "CRED"
    - "Swiggy"
    - "Zomato"
    - "Postman"
    - "BrowserStack"
    - "Grab"
    - "Spotify"
    - "LinkedIn"
    - "Nutanix"
    - "Cohesity"

  # Tier-3 = wider net. Same filter pipeline as tier1/tier2 — jobs at these
  # companies still get fetched and ranked, but they sort last in job_tracker.csv
  # priority. Useful for "would consider if a strong match shows up" companies.
  tier3:
    # Enterprise SaaS
    - "Salesforce"
    - "Intuit"
    - "HubSpot"
    - "ServiceNow"
    - "SAP"
    - "VMware"
    - "Zoom"
    # Fintech / payments
    - "PayPal"
    - "Juspay"
    - "Zeta"
    - "Pine Labs"
    - "Plaid"
    - "Brex"
    - "Mercury"
    - "Ramp"
    # Dev infra
    - "HashiCorp"
    - "Twilio"
    - "Okta"
    - "GitLab"
    - "Elastic"
    - "Grafana Labs"
    - "PlanetScale"
    - "Supabase"
    - "Replit"
    - "Render"
    - "Fly.io"
    - "Retool"
    - "Vanta"
    # Hardware / silicon
    - "NVIDIA"
    - "Qualcomm"
    - "Intel"
    - "AMD"
    - "Texas Instruments"
    - "Micron Technology"
    # India unicorns / consumer
    - "Meesho"
    - "Dream11"
    - "Zoho"
    - "ShareChat"
    - "Upstox"
    # AI labs (broader)
    - "Mistral AI"
    - "Cohere"
    - "Hugging Face"
    - "xAI"
    - "Inflection AI"
    - "Character.AI"
    - "DeepMind"
    # HR / ops SaaS
    - "Rippling"
    - "Deel"
    - "Lattice"
    - "Webflow"
    - "Canva"
    # Asia
    - "Sea (Garena/Shopee)"
    - "GoTo (Gojek)"
    - "Rakuten"
    - "Mercari"
    - "LINE"
    # EU
    - "Klarna"
    - "Revolut"
    - "Wise"
    - "N26"
    - "Adyen"
    - "Bolt"
    - "Booking.com"
    - "Delivery Hero"
    - "Zalando"
    - "Just Eat Takeaway"

filters:
  # Level-mapping hints. SDE-2 (Microsoft, Amazon), SDE-3 (Google), MTS (Adobe,
  # Salesforce, VMware), L4-L5 (Meta), Senior Software Engineer at smaller orgs.
  # The ranker reads these as positive signals when scoring fit. Aim: jobs that
  # want roughly 3+ years and individual-contributor scope, not new-grad and not
  # staff/principal.
  must_haves:
    - "SDE-2"
    - "SDE II"
    - "Software Engineer II"
    - "Software Development Engineer II"
    - "SDE-3"
    - "MTS"
    - "Member of Technical Staff"
    - "3+ years"
    - "3-5 years"
    - "mid-level"
    - "individual contributor"

  # Hard drop if any keyword appears in the JD. Keep tight to avoid false drops.
  dealbreakers:
    - "crypto"
    - "blockchain"
    - "web3"
    - "ad-tech"
    - "adtech"
    - "consulting"
    - "staffing"
    - "intern"
    - "internship"
    - "fresher"
    - "0-2 years"
    - "entry level"
    - "Principal Engineer"
    - "Staff Engineer"
    - "Distinguished Engineer"
    - "Engineering Manager"
    - "Senior Software Engineer"

outreach:
  daily_contact_cap: 50
  per_company_contact_cap: 8
  recruiter_cache_days: 7

posts:
  enabled: true
  max_results_per_role: 30
